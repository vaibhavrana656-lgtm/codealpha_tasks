<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeAlpha Books Dashboard</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f8; color: #1f2937; }
header { background: #ffffff; padding: 24px; border-bottom: 1px solid #d1d5db; }
main { max-width: 1200px; margin: 0 auto; padding: 24px; }
.kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi, .card { background: white; border: 1px solid #d1d5db; border-radius: 10px; padding: 18px; }
.kpi strong { display: block; font-size: 28px; margin-top: 8px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
.card img { width: 100%; height: auto; }
@media(max-width: 800px) { .kpis, .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header><h1>Books to Scrape Analytics Dashboard</h1><p>CodeAlpha Data Analytics Internship — Task 3</p></header>
<main>
<section class="kpis">
<div class="kpi">Total Books<strong>993</strong></div>
<div class="kpi">Average Price<strong>£35.13</strong></div>
<div class="kpi">Median Price<strong>£36.17</strong></div>
<div class="kpi">Average Rating<strong>3.13/5</strong></div>
</section>
<section class="grid"><div class="card"><h2>Price Distribution</h2><img src="outputs/price_distribution.png" alt="Price Distribution"></div><div class="card"><h2>Rating Distribution</h2><img src="outputs/rating_distribution.png" alt="Rating Distribution"></div><div class="card"><h2>Average Price by Rating</h2><img src="outputs/average_price_by_rating.png" alt="Average Price by Rating"></div><div class="card"><h2>Price Spread by Rating</h2><img src="outputs/price_boxplot_by_rating.png" alt="Price Spread by Rating"></div><div class="card"><h2>Title Length vs Price</h2><img src="outputs/title_length_vs_price.png" alt="Title Length vs Price"></div><div class="card"><h2>Top 10 Most Expensive Books</h2><img src="outputs/top_10_expensive_books.png" alt="Top 10 Most Expensive Books"></div></section>
</main>
</body>
</html>
